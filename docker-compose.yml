services:
  dartscheduler:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - dart_data:/data
    environment:
      - DATABASE_PATH=/data/dartscheduler.db
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dart_data:
