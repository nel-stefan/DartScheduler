name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # Angular: build first (Go embeds the dist)
  # ─────────────────────────────────────────────
  angular:
    name: Angular build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Inject version
        run: |
          VERSION=$(date -u '+%Y-%m-%d %H:%M')
          sed -i "s/version: '.*'/version: '${VERSION}'/" frontend/src/environments/environment.ts
          sed -i "s/version: '.*'/version: '${VERSION}'/" frontend/src/environments/environment.prod.ts
          echo "Version: $VERSION"

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Build summary
        run: |
          echo "## Angular build results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find frontend/dist -name "*.js" -o -name "*.css" | sort | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload Angular dist
        uses: actions/upload-artifact@v7
        with:
          name: angular-dist
          path: web/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Go: build + test + coverage (needs Angular dist for //go:embed)
  # ─────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    needs: angular

    steps:
      - uses: actions/checkout@v6

      - name: Download Angular dist
        uses: actions/download-artifact@v8
        with:
          name: angular-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted Go files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -timeout 300s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          echo "## Go test results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test count per package
          echo "### Tests per package" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          go test -timeout 300s -v ./... 2>&1 | awk '
            /^=== RUN/ { count++ }
            /^ok/ {
              pkg=$2; status="✅ pass"
              printf "| %s | %d | %s |\n", pkg, count, status
              count=0
            }
            /^FAIL/ {
              pkg=$2; status="❌ fail"
              printf "| %s | %d | %s |\n", pkg, count, status
              count=0
            }
          ' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # Total coverage
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $COVERAGE**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -v "^total" | awk '{printf "| %s %s | %s |\n", $1, $2, $3}' >> $GITHUB_STEP_SUMMARY


      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

