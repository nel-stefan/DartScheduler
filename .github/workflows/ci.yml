name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # Angular: build first (Go embeds the dist)
  # ─────────────────────────────────────────────
  angular:
    name: Angular build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Inject version
        run: |
          BUILD=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          VERSION="build #${BUILD} (${SHA})"
          sed -i "s/version: 'dev'/version: '${VERSION}'/" frontend/src/environments/environment.ts
          sed -i "s/version: 'dev'/version: '${VERSION}'/" frontend/src/environments/environment.prod.ts
          echo "Version: $VERSION"

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Build summary
        run: |
          echo "## Angular build results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find frontend/dist -name "*.js" -o -name "*.css" | sort | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload Angular dist
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: web/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Go: build + test + coverage (needs Angular dist for //go:embed)
  # ─────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    needs: angular

    steps:
      - uses: actions/checkout@v4

      - name: Download Angular dist
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -timeout 300s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          echo "## Go test results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test count per package
          echo "### Tests per package" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          go test -timeout 300s -v ./... 2>&1 | awk '
            /^=== RUN/ { count++ }
            /^ok/ {
              pkg=$2; status="✅ pass"
              printf "| %s | %d | %s |\n", pkg, count, status
              count=0
            }
            /^FAIL/ {
              pkg=$2; status="❌ fail"
              printf "| %s | %d | %s |\n", pkg, count, status
              count=0
            }
          ' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # Total coverage
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $COVERAGE**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -v "^total" | awk '{printf "| %s %s | %s |\n", $1, $2, $3}' >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // Test counts
            const testOutput = execSync('go test -timeout 300s -v ./... 2>&1 || true', { encoding: 'utf8' });
            const total = (testOutput.match(/^=== RUN/mg) || []).length;
            const passed = (testOutput.match(/--- PASS/mg) || []).length;
            const failed = (testOutput.match(/--- FAIL/mg) || []).length;

            // Coverage
            const coverOutput = execSync('go tool cover -func=coverage.out', { encoding: 'utf8' });
            const coverLine = coverOutput.split('\n').find(l => l.includes('total'));
            const coverage = coverLine ? coverLine.split(/\s+/).pop() : '?';

            // Build status
            const buildOk = execSync('go build ./... 2>&1 || echo FAIL', { encoding: 'utf8' }).trim();
            const buildStatus = buildOk === '' || buildOk === 'FAIL' && !buildOk.includes('FAIL')
              ? '✅ passed' : (buildOk === '' ? '✅ passed' : '❌ failed');

            const body = [
              '## CI Results — Go',
              '',
              `| | |`,
              `|---|---|`,
              `| 🔨 Build | ${buildOk.includes('FAIL') ? '❌ failed' : '✅ passed'} |`,
              `| 🧪 Tests | ${passed} passed, ${failed} failed (${total} total) |`,
              `| 📊 Coverage | ${coverage} |`,
            ].join('\n');

            // Find existing bot comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('CI Results — Go'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

