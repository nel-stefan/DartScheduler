<mat-toolbar color="primary" class="app-toolbar">
  <img src="assets/favicon.svg" alt="dart" class="toolbar-logo">
  <span class="toolbar-title">DartScheduler</span>
  <span class="toolbar-spacer"></span>

  <mat-form-field appearance="outline" subscriptSizing="dynamic"
                  *ngIf="(seasonService.seasons$ | async)?.length"
                  class="toolbar-season-select">
    <mat-label>Seizoen</mat-label>
    <mat-select [value]="seasonService.selectedId$ | async"
                (selectionChange)="seasonService.select($event.value)">
      <mat-option *ngFor="let s of seasonService.seasons$ | async" [value]="s.id">
        {{ s.season || s.competitionName }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <nav class="toolbar-nav">
    <a mat-button routerLink="/"          routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}">
      <mat-icon>event_note</mat-icon> Schema
    </a>
    <a mat-button routerLink="/upload"    routerLinkActive="nav-active">
      <mat-icon>people</mat-icon> Spelers
    </a>
    <a mat-button routerLink="/standings" routerLinkActive="nav-active">
      <mat-icon>leaderboard</mat-icon> Klassement
    </a>
  </nav>
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
