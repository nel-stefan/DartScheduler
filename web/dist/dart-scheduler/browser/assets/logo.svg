<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Transparent background — designed for display on a coloured toolbar -->

  <!-- Dartboard rings (white outlines, alternating filled arcs for depth) -->
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>

  <!-- Double ring band -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="5.5"/>

  <!-- Triple ring band -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="5.5"/>

  <!-- Wire dividers: 8 lines spaced 22.5° apart (simplified from 20) -->
  <line x1="50" y1="4"  x2="50" y2="96" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="4"  y1="50" x2="96" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="17" y1="17" x2="83" y2="83" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="83" y1="17" x2="17" y2="83" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Bull outer -->
  <circle cx="50" cy="50" r="10" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
  <!-- Bull inner -->
  <circle cx="50" cy="50" r="4.5" fill="rgba(255,255,255,0.85)"/>

  <!-- Dart: shaft from upper-right, tip near bull -->
  <!-- Flight (wide triangle) -->
  <polygon points="84,14 78,10 91,7 92,20" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
  <!-- Shaft -->
  <line x1="82" y1="16" x2="57" y2="42" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <!-- Barrel -->
  <line x1="71" y1="27" x2="58" y2="41" stroke="rgba(255,255,255,0.95)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Tip -->
  <line x1="58" y1="41" x2="52.5" y2="47" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
